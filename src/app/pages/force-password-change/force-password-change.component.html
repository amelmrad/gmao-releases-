<div class="login-wrapper">
  <div class="login-bg">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>

  <div class="login-card slide-in">
    <div class="login-header">
      <div class="login-logo">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h1>Changement de mot de passe requis</h1>
      <p>Pour des raisons de sécurité, veuillez définir un nouveau mot de passe avant de continuer.</p>
    </div>

    <div class="alert-gmao danger" *ngIf="error">
      <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <div class="input-wrapper">
          <i class="bi bi-lock-fill input-icon"></i>
          <input [type]="showNewPass ? 'text' : 'password'"
                 formControlName="newPassword"
                 class="form-control"
                 placeholder="Minimum 6 caractères">
          <button type="button" class="toggle-pass" (click)="showNewPass = !showNewPass">
            <i class="bi" [class.bi-eye]="!showNewPass" [class.bi-eye-slash]="showNewPass"></i>
          </button>
        </div>
        <div class="invalid-msg" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('minlength')">
          Le mot de passe doit contenir au moins 6 caractères
        </div>
        <div class="invalid-msg" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('pattern') && !form.get('newPassword')?.hasError('minlength')">
          Le mot de passe doit contenir au moins une lettre et un chiffre
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <div class="input-wrapper">
          <i class="bi bi-lock-fill input-icon"></i>
          <input [type]="showConfirmPass ? 'text' : 'password'"
                 formControlName="confirmPassword"
                 class="form-control"
                 placeholder="Retapez le mot de passe">
          <button type="button" class="toggle-pass" (click)="showConfirmPass = !showConfirmPass">
            <i class="bi" [class.bi-eye]="!showConfirmPass" [class.bi-eye-slash]="showConfirmPass"></i>
          </button>
        </div>
        <div class="invalid-msg" *ngIf="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched">
          Les mots de passe ne correspondent pas
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">
          <i class="bi bi-check-circle-fill"></i> Définir le mot de passe
        </span>
        <span *ngIf="loading">
          <span class="spinner"></span> Mise à jour...
        </span>
      </button>
    </form>
  </div>
</div>
